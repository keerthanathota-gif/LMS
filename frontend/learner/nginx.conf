server {
    listen 5174;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls
    location /api/auth/        { proxy_pass http://user-service:3001/auth/; }
    location /api/users/       { proxy_pass http://user-service:3001/; }
    location /api/enrollments/ { proxy_pass http://user-service:3001/enrollments/; }
    location /api/courses/     { proxy_pass http://course-service:3002/courses/; }
    location /api/quiz/        { proxy_pass http://quiz-engine:3004/quiz/; }
    location /api/badges/      { proxy_pass http://badge-engine:3005/badges/; }
    location /api/certificates/ { proxy_pass http://certificate-engine:3006/certificates/; }
    location /api/companion/   { proxy_pass http://learner-companion:3011/; }
}
