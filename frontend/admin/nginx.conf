server {
    listen 5000;

    root /usr/share/nginx/html;
    index index.html;

    # ── Agent orchestrator (SSE streaming — needs special headers) ────────────
    location /api/admin/ {
        proxy_pass         http://agent-orchestrator:3008/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # ── REST API proxies — strip /api prefix, forward to correct service ──────
    # Using rewrite so both /api/foo and /api/foo/... (with or without trailing
    # slash, with or without extra path segments) are all handled correctly.
    # This mirrors the Vite dev-server proxy behaviour exactly.

    location /api/auth {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://user-service:3001;
    }
    location /api/users {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://user-service:3001;
    }
    location /api/enrollments {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://user-service:3001;
    }
    location /api/courses {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://course-service:3002;
    }
    location /api/learning-paths {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://course-service:3002;
    }
    location /api/content {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://content-service:3003;
    }
    location /api/quiz {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://quiz-engine:3004;
    }
    location /api/badges {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://badge-engine:3005;
    }
    location /api/certificates {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://certificate-engine:3006;
    }
    location /api/notifications {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://notification-service:3007;
    }
    location /api/tools {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://tool-registry:3009;
    }
    location /api/audit {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://audit-service:3010;
    }
    location /api/companion {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://learner-companion:3011;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
